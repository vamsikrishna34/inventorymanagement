version: '3.8'
services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]
  backend:
    build: .
    ports: ["5000:5000"]
    env_file: .env
    depends_on: ["mongo"]
  frontend:
    build: ./client
    ports: ["80:80"]
    depends_on: ["backend"]
volumes:
  mongo-data: